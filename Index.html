<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q4 Drill 1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body class="container text-center">

<h1 class="mt-4">The Classification of Electricity Usage</h1>

<p>Enter your electricity usage .</p>

<input type="number" id="consumption" class="form-control w-50 mx-auto" placeholder="Enter electricity usage">

<br>

<button class="btn btn-primary" onclick="checkConsumption()">Check Consumption</button>

<script>

function checkConsumption() {

    var consumption = document.getElementById("consumption").value;


    consumption = Number(consumption);

    // To check if the user entered a negative number or invalid input
    if (isNaN(consumption) || consumption < 0) {
        alert("Please enter a valid number.");
    }

    else if (consumption <= 100) {
        alert("Lifeline Consumer - Discounted electricity rates.");
    }

    else if (consumption <= 200) {
        alert("Low Consumption - Normal residential rate.");
    }

  
    else if (consumption <= 300) {
        alert("Average Consumption - Typical electricity usage.");
    }


    else if (consumption <= 500) {
        alert("High Consumption - Higher electricity usage.");
    }

    else {
        alert("Very High Consumption - Heavy electricity users.");
    }

}
</script>

</body>
</html>
